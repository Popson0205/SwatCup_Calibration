services:
  - type: web
    name: hydro-modeller
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn sufi2.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    numInstances: 1
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUFI2_MAX_UPLOAD_MB
        value: "50"
      - key: SUFI2_JOB_TTL_HOURS
        value: "2"
